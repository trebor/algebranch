name: Bug report
description: Report something that is broken or behaving incorrectly
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search existing issues
        first to avoid duplicates. For security vulnerabilities, **do not** open
        a public issue — see [SECURITY.md](https://github.com/trebor/algebranch/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I do X, Y happens, but I expected Z.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: |
        Exact steps so we can see it too. A share link or `?eq=` deep link that
        reproduces the issue is the fastest way to get a fix.
      placeholder: |
        1. Open https://… (or ?eq=x^2-9=0)
        2. Click the term '…'
        3. See the error
    validations:
      required: true
  - type: input
    id: share-link
    attributes:
      label: Share link / equation
      description: A `?eq=` or share-menu link that reproduces the problem, if applicable.
      placeholder: https://…/?eq=x%5E2-9%3D0
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device type
      description: Auto-detected by the in-app feedback form.
      placeholder: e.g. Desktop, Mobile, Tablet
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 130, Safari 18
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 15, iOS 18, Windows 11
    validations:
      required: false
  - type: input
    id: user-agent
    attributes:
      label: User agent
      description: Auto-filled raw browser string — ground truth if the parsed fields above miss an edge case.
      placeholder: Mozilla/5.0 …
    validations:
      required: false
  - type: input
    id: rating
    attributes:
      label: Experience rating
      description: Your star rating from the in-app feedback form, if given.
      placeholder: e.g. 4 stars
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: A picture of the glitch helps a lot — drag images right into this box.
    validations:
      required: false
