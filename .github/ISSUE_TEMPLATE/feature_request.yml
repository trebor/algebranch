name: Feature request
description: Suggest a new capability or an improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please search existing issues first — there may
        already be a discussion you can add to.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The motivation or use case. What are you trying to do that is hard or impossible today?
      placeholder: As a learner, I want to … so that …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine it working. Sketches, examples, or example equations are welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
  - type: input
    id: share-link
    attributes:
      label: Share link
      description: A `?ws=` workspace or `?eq=` equation link, if you want to attach one.
      placeholder: https://…/?eq=x%5E2-9%3D0
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Algebranch does this touch?
      options:
        - Math engine (transformations, correctness)
        - UI / interaction
        - Equation library
        - Graphing
        - Onboarding / docs
        - Other / not sure
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device type
      description: Auto-detected by the in-app feedback form.
      placeholder: e.g. Desktop, Mobile, Tablet
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 130, Safari 18
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 15, iOS 18, Windows 11
    validations:
      required: false
  - type: input
    id: user-agent
    attributes:
      label: User agent
      description: Auto-filled raw browser string — ground truth if the parsed fields above miss an edge case.
      placeholder: Mozilla/5.0 …
    validations:
      required: false
  - type: input
    id: rating
    attributes:
      label: Experience rating (1–5 stars)
      description: Auto-filled from your in-app rating — a number from 1 (worst) to 5 (best).
      placeholder: e.g. 4
    validations:
      required: false
