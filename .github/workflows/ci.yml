name: CI

# Pre-merge validation gate: lint -> type-check -> test -> build.
# Mirrors the local gate every agent runs before merging (see AGENTS.md /
# rules.md). Runs on PRs into main and on pushes to main (post-merge safety).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref so only the latest commit is gated.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      # `npm ci` runs the root `prepare` script, which builds the math-engine
      # workspace the UI consumes — so the steps below see a ready dist.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # Browser-gated a11y complement to the jsdom structural suite (#238): runs
  # axe-core (incl. `color-contrast`) against the built app in headless Chromium,
  # guarding the WCAG AA contrast work from #145. Separate job so the fast
  # validate gate above isn't slowed by the build + browser run.
  a11y-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Key the browser cache on the Playwright version so it invalidates
      # exactly when the pinned Chromium build changes.
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # No --with-deps: ubuntu-latest (24.04) already ships the system libraries
      # Chromium needs, and the apt-get update it triggers flakes on the runner's
      # pre-configured packages.microsoft.com repos (#453). Retry the download to
      # absorb transient CDN failures on the once-per-version cache miss.
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            if npx playwright install chromium; then
              exit 0
            fi
            echo "Playwright install attempt ${attempt} failed; retrying in 10s..." >&2
            sleep 10
          done
          echo "Playwright Chromium install failed after 3 attempts." >&2
          exit 1

      - name: Build
        run: npm run build

      # Serve the production build in the background, poll until it answers,
      # then run the audit.
      - name: Start server
        run: npm run start &

      - name: Wait for server
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 >/dev/null; then
              echo "Server is up."
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start within 60s." >&2
          exit 1

      - name: Run browser axe audit
        run: npm run axe
        env:
          AXE_BASE_URL: http://localhost:3000
