name: "CLA Assistant"

# Self-hosted CLA gate (CLA Assistant Lite). Signatures are stored in this repo
# on the `cla-signatures` branch — no third-party data storage. Pull requests are
# blocked until the contributor signs CLA.md.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Allow the action to read PRs/comments and write the signature file + status.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        # Own fork of upstream contributor-assistant/github-action, which was
        # archived 2026-03-23 frozen on the deprecated Node 20 runtime (#154).
        # This pin is upstream v2.6.1 — the exact code this repo has run for
        # months — with a single one-line change: action.yml runtime node20 ->
        # node24. dist/index.js (the executed bundle) is byte-identical to
        # v2.6.1 (git blob 00fffc31…64adf6), so nothing runs on this privileged
        # pull_request_target step that we haven't frozen and verified ourselves.
        uses: trebor/cla-github-action@82dc579d8d8562a3c2de5808a7e341b699b534e9 # v2.6.1 + node24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Where signatures are persisted (in this repo, on the branch below).
          path-to-signatures: "signatures/version1/cla.json"
          branch: "cla-signatures"
          # The document contributors are agreeing to.
          path-to-document: "https://github.com/trebor/algebranch/blob/main/CLA.md"
          # The exact comment a contributor posts to sign.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: "Thank you for your contribution to Algebranch. Before it can be merged, please read our [Contributor License Agreement](https://github.com/trebor/algebranch/blob/main/CLA.md) and sign it by posting the following comment on this pull request:"
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✍️ ✅"
          # Bots that never need to sign. algebranch-release-please[bot] opens the
          # automated release PRs (#337); it isn't a human contributor, so exempt it.
          allowlist: trebor,dependabot[bot],github-actions[bot],algebranch-release-please[bot]
          # Don't lock conversations after merge (the action's default). Locking
          # merged PRs makes release-please's post-release "released in vX.Y.Z"
          # comment fail (#337), turning every release run red. The marginal
          # protection (freezing a merged PR against signature-invalidating
          # commits) isn't worth that; main is already guarded by the validate gate.
          lock-pullrequest-aftermerge: false
